version: "3.9"

services:

  backend:
    build: ./backend
    container_name: ai-career-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: ai-career-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    environment:
      - VITE_API_URL=http://backend:8000